# Peppi SearXNG configuration
# Hardened for Render deployment behind the moltbot-gateway.
# See ../../searxng_research.md for the full derivation.
#
# IMPORTANT: secret_key holds the literal placeholder "ultrasecretkey" because
# the upstream container/entrypoint.sh ONLY substitutes that string when
# settings.yml is being created from scratch. Since we ship our own settings.yml
# via Dockerfile COPY, the upstream substitution is skipped — our entrypoint
# shim (entrypoint-shim.sh) handles the substitution explicitly using the
# SEARXNG_SECRET env var.

use_default_settings: true

general:
  debug: false
  instance_name: "Peppi Search"
  enable_metrics: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  # Substituted by entrypoint-shim.sh on every container start, using
  # SEARXNG_SECRET env var (set on Render). If SEARXNG_SECRET is unset, the
  # shim auto-generates a random value (matches upstream behaviour). The
  # placeholder string MUST stay literally "ultrasecretkey" so the shim's
  # sed pattern matches.
  secret_key: "ultrasecretkey"
  # Required behind a reverse proxy (Render edge). Trailing slash matters.
  base_url: "https://searxng-09k9.onrender.com/"
  # See research doc III.2: bot detection is neutralised via limiter.toml,
  # so we do not need Valkey/Redis here.
  limiter: false
  # MUST be false for an agent backend (forces link_token, breaks JSON callers).
  public_instance: false
  # We don't display thumbnails to SMS users.
  image_proxy: false
  # Matches the upstream Granian server (HTTP/1.1-capable, but using "1.0"
  # remains compatible and is what searxng/searxng:latest uses internally
  # for legacy reasons. Leave at "1.0" unless we change the entrypoint.)
  http_protocol_version: "1.0"
  method: "POST"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: false
  infinite_scroll: false

search:
  # Moderate by default; agent can override per-request via &safesearch=N.
  safe_search: 1
  # Disabled. Agents don't autocomplete.
  autocomplete: ""
  default_lang: "auto"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  formats:
    - html
    - json    # MUST be present or every JSON call returns 403 Forbidden.

outgoing:
  request_timeout: 4.0
  max_request_timeout: 10.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
  retries: 1
  # Always set in production. Engines can email this contact instead of
  # silently rate-limiting our IP.
  useragent_suffix: "Peppi/1.0 contact:peppishared@gmail.com"

enabled_plugins:
  - 'Tracker URL remover'
  - 'Self Information'
  - 'Hostnames plugin'

# Engine cooldown tuning. Default SearxEngineTooManyRequests is 3600s (1h) which
# parks brave for an hour after a single 429. Brave's actual rate-limit window is
# minutes, not hours — 600s lets it recover and contribute bonus 20-result hits
# without hammering when actively rate-limited. Other defaults left as-is
# (CAPTCHA = 24h, Cloudflare CAPTCHA = 15d) since those are less recoverable.
search:
  suspended_times:
    SearxEngineTooManyRequests: 600

engines:
  # Reliability matrix from 50-query burst test on Render egress (2026-04-30):
  #   bing      50/50 ok — primary anchor
  #   startpage 50/50 ok — secondary
  #   brave     0/50 ok when in cooldown, 20+ results when fresh — opportunistic bonus
  #   duckduckgo / qwant / karmasearch / mojeek — CAPTCHA / access-denied / timeout
  #   google*   — block cloud egress entirely
  # Engines left in the active set but blocked still pay full request_timeout
  # (4s) on the first query after every cooldown expiry, so we explicitly
  # disable the dead ones rather than letting the SearXNG defaults retry them.

  # Google family — blocks Render IP ranges entirely.
  - name: google
    disabled: true
  - name: google news
    disabled: true
  - name: google scholar
    disabled: true
  - name: google images
    disabled: true
  - name: google videos
    disabled: true

  # Permanently blocked from Render egress (CAPTCHA / access-denied / timeout).
  # Disabling them avoids the 4s timeout budget after every cooldown expiry.
  - name: duckduckgo
    disabled: true
  - name: duckduckgo news
    disabled: true
  - name: duckduckgo images
    disabled: true
  - name: duckduckgo videos
    disabled: true
  - name: qwant
    disabled: true
  - name: qwant news
    disabled: true
  - name: qwant images
    disabled: true
  - name: qwant videos
    disabled: true
  - name: mojeek
    disabled: true
  - name: mojeek news
    disabled: true
  - name: mojeek images
    disabled: true

  # Tor-only; not relevant for a clearnet agent.
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true

  # Tighten timeouts on slower engines so they don't dominate request_timeout.
  - name: wikidata
    timeout: 4.0
  - name: wikipedia
    timeout: 4.0
