services:
  # Peppi PM Playground - React frontend for testing
  - type: web
    name: peppi-playground
    runtime: static
    rootDir: playground
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://moltbot-fastapi.onrender.com