# Gateway service definition — direct Anthropic SDK, no OpenClaw subprocess.
# Service name kept as `openclaw-gateway` so existing FastAPI MOLTBOT_GATEWAY_URL
# stays valid (the URL https://openclaw-gateway-dg3y.onrender.com is referenced
# in fastapi-wrapper/render.yaml and would require a separate deploy to change).
services:
  - type: web
    name: openclaw-gateway
    runtime: node
    region: oregon
    plan: pro
    rootDir: moltbot-gateway
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    # Render Pro default shutdown grace = 30s. LLM calls can run 30-60s.
    # Bump so SIGTERM drain has time to finish in-flight requests.
    maxShutdownDelaySeconds: 120
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=2048"
      # Anthropic API key (required). Was already provisioned for openclaw stack.
      - key: ANTHROPIC_API_KEY
        sync: false
      # FastAPI base URL — used for OAuth token bridge + reminder/gmail/calendar tool dispatch.
      - key: FASTAPI_URL
        value: https://moltbot-fastapi.onrender.com
      # SearXNG base URL for web_search tool.
      - key: SEARXNG_URL
        value: https://searxng-09k9.onrender.com
      # Optional Helicone observability — set HELICONE_PROXY=true + HELICONE_KEY to enable.
      - key: HELICONE_PROXY
        value: "false"
      - key: HELICONE_KEY
        sync: false
