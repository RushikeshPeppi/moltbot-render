services:
  # FastAPI Wrapper - Handles all API requests from Peppi
  - type: web
    name: moltbot-fastapi
    runtime: python
    region: oregon
    plan: pro
    rootDir: fastapi-wrapper
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Encryption key for credentials (must be valid Fernet key - set in Render dashboard)
      - key: ENCRYPTION_KEY
        sync: false
      # API secret for authentication
      - key: API_SECRET_KEY
        generateValue: true
      # Shared bearer secret for Peppi -> wrapper -> gateway inter-service
      # auth. Generate with `openssl rand -hex 32` and set the SAME value on
      # Peppi + wrapper + gateway services. Rotate all three together.
      - key: MOLTBOT_INTERNAL_SECRET
        sync: false
      # Environment tier — production requires MOLTBOT_INTERNAL_SECRET to be
      # set; staging/dev tolerate missing secret for local testing.
      - key: ENV
        value: production
      # OpenClaw Gateway URL (internal service)
      - key: MOLTBOT_GATEWAY_URL
        value: https://openclaw-gateway-dg3y.onrender.com
      # Upstash Redis
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      # Supabase Database
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Upstash QStash (Reminder Scheduling)
      - key: QSTASH_URL
        sync: false
      - key: QSTASH_TOKEN
        sync: false
      - key: QSTASH_CURRENT_SIGNING_KEY
        sync: false
      - key: QSTASH_NEXT_SIGNING_KEY
        sync: false
      # Peppi Outbound SMS
      - key: PEPPI_OUTBOUND_URL
        sync: false
      - key: PEPPI_OUTBOUND_API_KEY
        sync: false

  # Peppi PM Playground - React frontend for testing
  - type: web
    name: peppi-playground
    runtime: static
    rootDir: playground
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://moltbot-fastapi.onrender.com

  # SearXNG - Free self-hosted search engine (NO API keys needed!)
  - type: web
    name: searxng
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./searxng/Dockerfile
    dockerContext: ./searxng
    healthCheckPath: /

  # OpenClaw Gateway - Runs the AI agent
  - type: web
    name: openclaw-gateway
    runtime: node
    region: oregon
    plan: pro
    rootDir: moltbot-gateway
    buildCommand: |
      npm install && \
      npm install -g openclaw@latest
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: openclaw-data
      mountPath: /root/.openclaw
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=2048"
      # Google Gemini API Key for LLM (REQUIRED)
      - key: GEMINI_API_KEY
        sync: false
      # SearXNG URL (internal free search)
      - key: SEARXNG_BASE_URL
        value: https://searxng-09k9.onrender.com
      # FastAPI URL for OAuth token bridge
      - key: FASTAPI_URL
        value: https://moltbot-fastapi.onrender.com
      # Bearer token the daemon expects on /v1/chat/completions. Loopback
      # traffic inside the container bypasses remote auth, but we set a
      # token anyway as defence in depth. Generate with `openssl rand -hex 32`
      # and paste into the Render dashboard — do not commit.
      - key: OPENCLAW_GATEWAY_TOKEN
        sync: false
      # Shared bearer secret for Peppi -> wrapper -> gateway inter-service
      # auth (SAME value on all three services).
      - key: MOLTBOT_INTERNAL_SECRET
        sync: false
      - key: ENV
        value: production
      # Internal port the daemon binds to inside the container. Must not
      # collide with $PORT (which server.js owns and Render exposes).
      - key: OPENCLAW_DAEMON_PORT
        value: "18790"

