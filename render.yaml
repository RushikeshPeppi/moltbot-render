services:
  # FastAPI Wrapper - Handles all API requests from Peppi
  - type: web
    name: moltbot-fastapi
    runtime: python
    region: oregon
    plan: pro
    rootDir: fastapi-wrapper
    buildCommand: pip install -r requirements.txt
    # --no-server-header: suppress uvicorn's `Server: uvicorn` version fingerprint
    # (CASA 6.2.1). uvicorn emits it below the ASGI layer, so it can only be removed here,
    # not in middleware.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --no-server-header
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Encryption key for credentials (must be valid Fernet key - set in Render dashboard)
      - key: ENCRYPTION_KEY
        sync: false
      # API secret for authentication
      - key: API_SECRET_KEY
        generateValue: true
      # Shared service-to-service key for internal callers (gateway, Peppi Laravel).
      # MUST be identical across moltbot-fastapi, openclaw-gateway, and Peppi Laravel,
      # so it is set manually (generateValue would differ per service). Guarded
      # routes fail closed (503) if empty.
      - key: INTERNAL_SERVICE_KEY
        sync: false
      # Gateway URL (Anthropic SDK service — service name kept for URL stability)
      - key: MOLTBOT_GATEWAY_URL
        value: https://openclaw-gateway-dg3y.onrender.com
      # Upstash Redis
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      # Supabase Database
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Upstash QStash (Reminder Scheduling)
      - key: QSTASH_URL
        sync: false
      - key: QSTASH_TOKEN
        sync: false
      - key: QSTASH_CURRENT_SIGNING_KEY
        sync: false
      - key: QSTASH_NEXT_SIGNING_KEY
        sync: false
      # Peppi Outbound SMS
      - key: PEPPI_OUTBOUND_URL
        sync: false
      - key: PEPPI_OUTBOUND_API_KEY
        sync: false

  # Peppi PM Playground - React frontend for testing
  - type: web
    name: peppi-playground
    runtime: static
    rootDir: playground
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://moltbot-fastapi.onrender.com

  # SearXNG - Privacy-preserving meta-search backend for the gateway's web-search skill.
  # Hardened per searxng_research.md (settings.yml + limiter.toml + entrypoint-shim.sh).
  - type: web
    name: searxng
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./searxng/Dockerfile
    dockerContext: ./searxng
    healthCheckPath: /healthz
    envVars:
      # Flask SECRET_KEY. The entrypoint-shim substitutes this into
      # settings.yml's `secret_key: "ultrasecretkey"` placeholder on every
      # container start. If unset, the shim auto-generates a random value.
      - key: SEARXNG_SECRET
        generateValue: true
      # Belt-and-suspenders: explicitly tell Render which port the container
      # listens on, in case auto-detection of EXPOSE 8080 fails on cold starts.
      - key: PORT
        value: "8080"

  # Moltbot Gateway — direct Anthropic SDK (replaces OpenClaw subprocess pattern).
  # Service name kept as `openclaw-gateway` so the deployed URL
  # https://openclaw-gateway-dg3y.onrender.com stays stable and FastAPI's
  # MOLTBOT_GATEWAY_URL above doesn't need changing.
  - type: web
    name: openclaw-gateway
    runtime: node
    region: oregon
    plan: pro
    rootDir: moltbot-gateway
    # MUST run the TypeScript build — start runs `node dist/server.js`.
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    # Render Pro default shutdown grace = 30s. LLM calls can run 30-90s.
    # Bump so SIGTERM drain has time to finish in-flight requests.
    maxShutdownDelaySeconds: 120
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=2048"
      # Anthropic API key (required) — the SDK migration replaces Gemini.
      - key: ANTHROPIC_API_KEY
        sync: false
      # SearXNG URL — note: env var renamed from SEARXNG_BASE_URL to match src/env.ts.
      - key: SEARXNG_URL
        value: https://searxng-09k9.onrender.com
      # FastAPI URL — OAuth token bridge + reminder tool dispatch.
      - key: FASTAPI_URL
        value: https://moltbot-fastapi.onrender.com
      # Shared service key — MUST match moltbot-fastapi's INTERNAL_SERVICE_KEY.
      # Gateway sends it on the token-bridge fetch and requires it on /execute.
      - key: INTERNAL_SERVICE_KEY
        sync: false
      # Optional Helicone observability — set HELICONE_PROXY=true + HELICONE_KEY to enable.
      - key: HELICONE_PROXY
        value: "false"
      - key: HELICONE_KEY
        sync: false

